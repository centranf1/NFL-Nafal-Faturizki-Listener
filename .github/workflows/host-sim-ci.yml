name: Host Simulation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  matrix_build_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]
        profile: [debug, release]
        features: ["host", "host playback"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true
      - name: Show cargo version
        run: cargo --version
      - name: Build firmware (host)
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo build -p nfl-firmware --features host --release --verbose
          else
            cargo build -p nfl-firmware --features host --verbose
          fi
      - name: Run firmware tests (host)
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo test -p nfl-firmware --features host --release --verbose
          else
            cargo test -p nfl-firmware --features host --verbose
          fi

  e2e_simulation:
    runs-on: ubuntu-latest
    needs: matrix_build_test
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Build host simulator
        run: cargo build -p host_sim --features host --release --verbose
      - name: Run end-to-end simulation (1kHz tone)
        run: |
          cargo run -p host_sim --features host --release -- \
            --output /tmp/e2e_test_output.wav \
            --tone-freq 1000.0 \
            --tone-amp 0.1 \
            --duration 2 \
            --csv /tmp/e2e_stats.csv
      - name: Validate simulation output
        run: |
          python3 scripts/validate_e2e.py \
            --wav /tmp/e2e_test_output.wav \
            --csv /tmp/e2e_stats.csv \
            --min-snr 20.0
      - name: Upload simulation output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-simulation-output
          path: |
            /tmp/e2e_test_output.wav
            /tmp/e2e_stats.csv

  benchmark:
    runs-on: ubuntu-latest
    needs: matrix_build_test
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Build benchmark crate
        run: cargo build --manifest-path tools/host_bench/Cargo.toml --release --verbose
      - name: Run bench
        run: |
          cargo bench --manifest-path tools/host_bench/Cargo.toml --release -- --nocapture
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: target/criterion
